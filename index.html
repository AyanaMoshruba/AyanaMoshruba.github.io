<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayana Moshruba — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Variables ───────────────────────────────────────── */
    :root {
      --ink:         #0f1117;
      --ink-muted:   #4a4f5e;
      --ink-faint:   #8a8f9e;
      --surface:     #f6f5f2;
      --surface-2:   #edecea;
      --border:      #d8d5d0;
      --white:       #ffffff;
      --accent:      #2a4fd6;
      --accent-2:    #1b3aaa;
      --accent-warm: #c05c1a;
      --sb-bg:       #0f1117;
      --sb-sub:      #181e30;
      --sb-deep:     #111520;
      --radius-md:   12px;
      --radius-lg:   20px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:   0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --font-serif:  'DM Serif Display', Georgia, serif;
      --font-sans:   'DM Sans', system-ui, sans-serif;
      --font-mono:   'JetBrains Mono', monospace;
      --ease:        0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--surface); color: var(--ink); line-height: 1.65; font-size: 15px; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ══════════════════════════════════════════════════════
       DESKTOP LAYOUT  (> 860px)
       Flexbox row: sidebar 300px | main fills rest
    ══════════════════════════════════════════════════════ */
    .layout {
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      max-width: 1380px;
      margin: 0 auto;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: var(--sb-bg);
      color: var(--surface);
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: #2a3050 transparent;
    }

    .sb-profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: .75rem;
      padding: 2.5rem 1.75rem 1.25rem;
    }

    .profile-img {
      width: 130px; height: 130px;
      border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,255,255,.12);
    }
    .profile-placeholder {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e2a50, #2a3a6e);
      border: 3px solid rgba(255,255,255,.12);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; color: rgba(255,255,255,.35);
      font-size: .65rem; letter-spacing: .06em; text-transform: uppercase;
    }
    .profile-placeholder i { font-size: 2rem; }

    .sb-name  { font-family: var(--font-serif); font-size: 1.4rem; line-height: 1.2; color: #fff; }
    .sb-title { font-size: .75rem; color: rgba(255,255,255,.5); line-height: 1.5; }
    .sb-inst  { display: flex; align-items: center; justify-content: center; gap: 5px; font-size: .7rem; color: rgba(255,255,255,.35); }
    .sb-inst i { font-size: .62rem; }

    .sb-social { padding: 0 1.75rem .9rem; display: flex; flex-wrap: wrap; gap: 7px; }

    .social-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.65);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .85rem;
      transition: background var(--ease), color var(--ease), transform var(--ease);
    }
    .social-btn:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }

    .sb-nav { padding: 0 1rem; display: flex; flex-direction: column; gap: 2px; }
    .sb-nav-label { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.25); padding: 0 8px; margin: 4px 0 6px; }

    .nav-link {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 7px; font-size: .8rem;
      color: rgba(255,255,255,.55);
      transition: background var(--ease), color var(--ease);
    }
    .nav-link i { font-size: .75rem; width: 15px; text-align: center; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,.08); color: rgba(255,255,255,.95); }

    .sb-divider { height: 1px; background: rgba(255,255,255,.06); margin: 1rem 1.75rem; }

    .sb-section { padding: 0 1.75rem; margin-bottom: 1.5rem; }
    .sb-section-title { font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-bottom: 10px; }

    .edu-item { margin-bottom: 12px; }
    .edu-degree { font-size: .75rem; font-weight: 500; color: rgba(255,255,255,.82); line-height: 1.35; }
    .edu-inst   { font-size: .7rem; color: rgba(255,255,255,.4); margin-top: 2px; }
    .edu-period { font-family: var(--font-mono); font-size: .62rem; color: var(--accent); margin-top: 2px; }

    .award-item {
      font-size: .72rem; color: rgba(255,255,255,.5);
      padding: 7px 10px; background: rgba(255,255,255,.04);
      border-radius: 5px; border-left: 2px solid var(--accent-warm);
      margin-bottom: 7px; line-height: 1.45;
    }

    .skills-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
    .skill-tag { font-size: .65rem; padding: 3px 8px; border-radius: 99px; background: rgba(255,255,255,.06); color: rgba(255,255,255,.55); border: 1px solid rgba(255,255,255,.09); }

    /* ── Main ────────────────────────────────────────────── */
    .main { flex: 1; min-width: 0; padding: 3rem 3.5rem; }

    /* ══════════════════════════════════════════════════════
       MOBILE  (≤ 860px)
       Layout becomes column: sidebar on top (full width),
       main below (full width). No squeezing.
    ══════════════════════════════════════════════════════ */
    @media (max-width: 860px) {

      /* Stack vertically */
      .layout { flex-direction: column; }

      /* Sidebar becomes full-width block, no longer sticky/fixed-height */
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        overflow: visible;
      }

      /* Profile: centered */
      .sb-profile { padding: 2rem 1.5rem 1rem; }

      /* Social: centered row */
      .sb-social { padding: 0 1.5rem .75rem; justify-content: center; }

      /* Nav: horizontal scrollable tab strip */
      .sb-nav {
        flex-direction: row;
        padding: 0;
        gap: 0;
        background: var(--sb-sub);
        border-top: 1px solid rgba(255,255,255,.06);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .sb-nav::-webkit-scrollbar { display: none; }
      .sb-nav-label { display: none; }
      .nav-link {
        flex: 1;
        justify-content: center;
        padding: 11px 8px;
        border-radius: 0;
        font-size: .78rem;
        min-width: 72px;
        white-space: nowrap;
        border-bottom: 2px solid transparent;
      }
      .nav-link:hover, .nav-link.active {
        background: transparent;
        border-bottom-color: var(--accent);
        color: #fff;
      }

      /* Info sections: 3-column grid across full width */
      .sb-sections-grid {
        background: var(--sb-deep);
        padding: 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1.25rem 1.75rem;
      }
      /* Dividers hidden in grid mode */
      .sb-sections-grid .sb-divider { display: none; }

      .sb-section { padding: 0; margin-bottom: 0; }
      .sb-section.edu    { grid-column: 1 / -1; }
      .sb-section.awards { grid-column: 1 / 2; }
      .sb-section.skills { grid-column: 2 / 4; }

      /* Main is now full width below */
      .main { padding: 1.75rem 1.25rem; }
    }

    /* Very narrow phones */
    @media (max-width: 560px) {
      .sb-profile { padding: 1.5rem 1rem .75rem; }
      .profile-img, .profile-placeholder { width: 88px; height: 88px; }
      .profile-placeholder i { font-size: 1.5rem; }
      .sb-name { font-size: 1.2rem; }

      /* All info sections single column */
      .sb-sections-grid {
        grid-template-columns: 1fr;
        padding: 1.25rem 1rem;
        gap: 1.1rem;
      }
      .sb-section.edu,
      .sb-section.awards,
      .sb-section.skills { grid-column: 1; }

      .main { padding: 1.1rem .85rem; }
      .hero { padding: 1.25rem !important; border-radius: var(--radius-md) !important; }
      .hero h1 { font-size: 1.45rem !important; }
      .card { grid-template-columns: 1fr !important; }
      .card-img { min-height: 120px; }
      .section-header h2 { font-size: 1.3rem !important; }
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
      padding: 2rem 2.5rem; margin-bottom: 3rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), #5b7ef7, var(--accent-warm));
    }
    .hero-label { font-family: var(--font-mono); font-size: .67rem; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .hero h1 { font-family: var(--font-serif); font-size: 2.4rem; line-height: 1.15; color: var(--ink); margin-bottom: 4px; }
    .hero-subtitle { font-size: .88rem; color: var(--ink-muted); margin-bottom: 1.25rem; }
    .hero-objective { font-size: .875rem; color: var(--ink-muted); line-height: 1.8; max-width: 680px; }
    .expertise-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 1.25rem; }
    .expertise-chip { font-size: .7rem; padding: 4px 12px; border-radius: 99px; background: #eef1fc; color: var(--accent); border: 1px solid #d0d9f5; font-weight: 500; }

    /* ── Sections ─────────────────────────────────────────── */
    .section { margin-bottom: 4rem; }
    .section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.75rem; }
    .section-header h2 { font-family: var(--font-serif); font-size: 1.75rem; font-weight: 400; }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-count { font-family: var(--font-mono); font-size: .68rem; color: var(--ink-faint); background: var(--surface-2); padding: 2px 8px; border-radius: 99px; }

    /* ── Cards ────────────────────────────────────────────── */
    .cards-grid { display: flex; flex-direction: column; gap: 1.1rem; }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
      display: grid; grid-template-columns: 175px 1fr; overflow: hidden;
      transition: box-shadow var(--ease), transform var(--ease);
      animation: fadeUp .4s ease both;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .card:nth-child(2) { animation-delay: .05s; }
    .card:nth-child(3) { animation-delay: .1s; }
    .card:nth-child(4) { animation-delay: .15s; }
    .card:nth-child(5) { animation-delay: .2s; }

    .card-img { background: linear-gradient(135deg,#e8ecf8,#dde2f2); display: flex; align-items: center; justify-content: center; min-height: 150px; overflow: hidden; flex-shrink: 0; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-img-ph { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; color: #8a96c8; font-size: .62rem; letter-spacing: .06em; text-transform: uppercase; padding: 1rem; text-align: center; }
    .card-img-ph i { font-size: 1.7rem; opacity: .45; }

    .card-body { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-venue { font-family: var(--font-mono); font-size: .66rem; color: var(--accent-warm); font-weight: 500; }
    .card-year  { font-family: var(--font-mono); font-size: .66rem; color: var(--ink-faint); }
    .badge-review { font-size: .62rem; padding: 2px 7px; border-radius: 99px; background: #fff3e0; color: var(--accent-warm); border: 1px solid #f5c89a; }
    .card-title   { font-family: var(--font-serif); font-size: 1.02rem; line-height: 1.35; color: var(--ink); }
    .card-authors { font-size: .72rem; color: var(--ink-faint); font-style: italic; }
    .card-desc    { font-size: .81rem; color: var(--ink-muted); line-height: 1.75; margin-top: 3px; }
    .card-tags    { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .card-tag     { font-size: .63rem; padding: 2px 8px; border-radius: 99px; background: var(--surface-2); color: var(--ink-muted); border: 1px solid var(--border); }
    .card-link    { display: inline-flex; align-items: center; gap: 5px; font-size: .73rem; color: var(--accent); margin-top: 5px; font-weight: 500; transition: color var(--ease); }
    .card-link:hover { color: var(--accent-2); }

    /* ── Talks ────────────────────────────────────────────── */
    .talk-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.2rem 1.4rem; display: flex; align-items: flex-start; gap: 1rem; box-shadow: var(--shadow-sm); }
    .talk-icon { width: 38px; height: 38px; border-radius: 9px; background: linear-gradient(135deg,#eef1fc,#dde2f2); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: .95rem; flex-shrink: 0; }
    .talk-title { font-size: .88rem; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
    .talk-meta  { font-size: .73rem; color: var(--ink-faint); }

    footer { text-align: center; padding: 2rem; font-size: .73rem; color: var(--ink-faint); border-top: 1px solid var(--border); margin-top: 2rem; }

    /* ── Loading ──────────────────────────────────────────── */
    .loading-screen { position: fixed; inset: 0; background: var(--surface); display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity .4s ease; }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--ink-faint); font-size: .78rem; }
    .loader-dots { display: flex; gap: 6px; }
    .loader-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite ease-in-out; }
    .loader-dot:nth-child(2) { animation-delay: .2s; }
    .loader-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loader">
    <div class="loader-dots">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
    </div>
    Loading…
  </div>
</div>

<div class="layout" id="pageWrap" style="opacity:0">

  <!-- ══ SIDEBAR (desktop) / TOP HEADER (mobile) ═══════════ -->
  <aside class="sidebar">

    <div class="sb-profile">
      <div id="profilePhotoEl"></div>
      <div>
        <div class="sb-name"  id="sbName">—</div>
        <div class="sb-title" id="sbTitle">—</div>
        <div class="sb-inst"><i class="fa-solid fa-location-dot"></i><span id="sbInst">—</span></div>
      </div>
    </div>

    <div class="sb-social" id="socialLinks"></div>

    <nav class="sb-nav">
      <div class="sb-nav-label">Navigate</div>
      <a class="nav-link" href="#about">        <i class="fa-regular fa-user"></i>          About</a>
      <a class="nav-link" href="#projects">     <i class="fa-solid fa-flask"></i>            Projects</a>
      <a class="nav-link" href="#publications"> <i class="fa-regular fa-file-lines"></i>     Publications</a>
      <a class="nav-link" href="#talks">        <i class="fa-solid fa-microphone-lines"></i> Talks</a>
    </nav>

    <!-- On desktop these render as stacked sections.
         On mobile the .sb-sections-grid wrapper becomes a CSS grid. -->
    <div class="sb-sections-grid">
      <div class="sb-divider"></div>
      <div class="sb-section edu">
        <div class="sb-section-title">Education</div>
        <div id="eduList"></div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section awards">
        <div class="sb-section-title">Awards</div>
        <div id="awardsList"></div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section skills">
        <div class="sb-section-title">Core Skills</div>
        <div class="skills-wrap" id="skillsList"></div>
      </div>
    </div>

  </aside>

  <!-- ══ MAIN CONTENT ══════════════════════════════════════ -->
  <main class="main">

    <div class="hero" id="about">
      <div class="hero-label">PhD Candidate · George Mason University</div>
      <h1 id="heroName">—</h1>
      <div class="hero-subtitle" id="heroSubtitle">—</div>
      <p class="hero-objective" id="heroObjective">—</p>
      <div class="expertise-row" id="expertiseRow"></div>
    </div>

    <section class="section" id="projects">
      <div class="section-header">
        <h2>Research Projects</h2>
        <div class="section-line"></div>
        <span class="section-count" id="projectCount">0</span>
      </div>
      <div class="cards-grid" id="projectsGrid"></div>
    </section>

    <section class="section" id="publications">
      <div class="section-header">
        <h2>Publications</h2>
        <div class="section-line"></div>
        <span class="section-count" id="pubCount">0</span>
      </div>
      <div class="cards-grid" id="publicationsGrid"></div>
    </section>

    <section class="section" id="talks">
      <div class="section-header">
        <h2>Invited Talks</h2>
        <div class="section-line"></div>
      </div>
      <div id="talksList" style="display:flex;flex-direction:column;gap:.9rem"></div>
    </section>

    <footer>Built with care · <span id="updateYear"></span></footer>
  </main>
</div>

<script>
(async () => {
  const $ = id => document.getElementById(id);
  const make = (tag, cls, html) => {
    const e = document.createElement(tag);
    if (cls)  e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  };

  let data;
  try {
    const r = await fetch('data.json');
    if (!r.ok) throw '';
    data = await r.json();
  } catch {
    $('loadingScreen').innerHTML = '<p style="color:#c05c1a;padding:2rem;text-align:center;font-family:monospace">Could not load data.json</p>';
    return;
  }

  const p = data.profile;
  $('sbName').textContent       = p.name;
  $('sbTitle').textContent      = p.title;
  $('sbInst').textContent       = p.institution + ' · ' + p.location;
  $('heroName').textContent     = p.name;
  $('heroSubtitle').textContent = p.title + ' · ' + p.institution;
  $('heroObjective').textContent= p.objective;
  $('updateYear').textContent   = new Date().getFullYear();

  const pw = $('profilePhotoEl');
  if (p.photo) {
    const img = document.createElement('img');
    img.className = 'profile-img'; img.src = p.photo; img.alt = p.name;
    img.onerror = () => { pw.innerHTML = ph(); };
    pw.appendChild(img);
  } else { pw.innerHTML = ph(); }
  function ph() { return `<div class="profile-placeholder"><i class="fa-regular fa-user"></i><span>Photo</span></div>`; }

  const linkDefs = [
    {key:'email',   icon:'fa-solid fa-envelope',       label:'Email',         pre:'mailto:'},
    {key:'phone',   icon:'fa-solid fa-phone',          label:'Phone',         pre:'tel:'},
    {key:'github',  icon:'fa-brands fa-github',        label:'GitHub',        pre:''},
    {key:'linkedin',icon:'fa-brands fa-linkedin-in',   label:'LinkedIn',      pre:''},
    {key:'scholar', icon:'fa-brands fa-google-scholar',label:'Google Scholar',pre:''},
  ];
  linkDefs.forEach(d => {
    const val = data.links[d.key]; if (!val) return;
    const a = make('a','social-btn');
    a.href = d.pre+val; a.title = d.label; a.target='_blank'; a.rel='noopener';
    a.innerHTML = `<i class="${d.icon}"></i>`;
    $('socialLinks').appendChild(a);
  });

  (data.education||[]).forEach(e => {
    const d = make('div','edu-item');
    d.innerHTML = `<div class="edu-degree">${e.degree}</div><div class="edu-inst">${e.institution}</div><div class="edu-period">${e.period}</div>`;
    $('eduList').appendChild(d);
  });

  (data.awards||[]).forEach(a => $('awardsList').appendChild(make('div','award-item',a)));

  ['Python','C/C++','PyTorch','TensorFlow','SNNTorch','LAVA','TENNLab','OpenCV','AWS/GCP','MongoDB','MATLAB']
    .forEach(s => $('skillsList').appendChild(make('span','skill-tag',s)));

  ['Spiking Neural Networks','Membership Inference','Differential Privacy','Model Stealing',
   'Adversarial ML','PyTorch','TensorFlow','SNNTorch','Graph Neural Networks','Neuromorphic Computing']
    .forEach(s => $('expertiseRow').appendChild(make('span','expertise-chip',s)));

  function buildCard(item, isPub) {
    const c = make('div','card');
    const iw = make('div','card-img');
    if (item.image) {
      const img = document.createElement('img'); img.src=item.image; img.alt=item.title; iw.appendChild(img);
    } else {
      iw.innerHTML = `<div class="card-img-ph"><i class="fa-regular fa-image"></i><span>Image</span></div>`;
    }
    c.appendChild(iw);
    const body = make('div','card-body');
    const meta = make('div','card-meta');
    if (isPub && item.venue) meta.appendChild(make('span','card-venue',item.venue));
    if (isPub && item.year)  meta.appendChild(make('span','card-year', item.year));
    if (isPub && item.venue==='Under Review') meta.appendChild(make('span','badge-review','<i class="fa-solid fa-clock"></i> Under Review'));
    body.appendChild(meta);
    body.appendChild(make('div','card-title',item.title));
    if (isPub && item.authors) body.appendChild(make('div','card-authors',item.authors));
    body.appendChild(make('p','card-desc',item.description));
    if (item.tags?.length) {
      const t = make('div','card-tags');
      item.tags.forEach(tag => t.appendChild(make('span','card-tag',tag)));
      body.appendChild(t);
    }
    if (item.link) {
      const lnk = make('a','card-link');
      lnk.href=item.link; lnk.target='_blank'; lnk.rel='noopener';
      lnk.innerHTML='<i class="fa-solid fa-arrow-up-right-from-square"></i> View Paper';
      body.appendChild(lnk);
    }
    c.appendChild(body);
    return c;
  }

  const projects = data.projects||[];
  $('projectCount').textContent = projects.length;
  projects.forEach(i => $('projectsGrid').appendChild(buildCard(i,false)));

  const pubs = data.publications||[];
  $('pubCount').textContent = pubs.length;
  pubs.forEach(i => $('publicationsGrid').appendChild(buildCard(i,true)));

  (data.talks||[]).forEach(t => {
    const item = make('div','talk-item');
    item.innerHTML = `<div class="talk-icon"><i class="fa-solid fa-microphone-lines"></i></div>
      <div><div class="talk-title">${t.title}</div>
      <div class="talk-meta">${t.event} · ${t.location} · ${t.year}</div></div>`;
    $('talksList').appendChild(item);
  });

  ['about','projects','publications','talks'].forEach(id => {
    const s = $(id); if (!s) return;
    new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
          document.querySelector(`.nav-link[href="#${e.target.id}"]`)?.classList.add('active');
        }
      });
    }, {rootMargin:'-25% 0px -65% 0px'}).observe(s);
  });

  $('loadingScreen').classList.add('hidden');
  setTimeout(() => $('loadingScreen').style.display='none', 400);
  const wrap = $('pageWrap');
  wrap.style.transition = 'opacity .35s ease';
  wrap.style.opacity = '1';
})();
</script>
</body>
</html>
